version: '3.8'

services:
  transaction-bank-postgres:
    image: postgres:17.1-bookworm
    container_name: transation-env-postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    restart: always

  app:
    build: .
    container_name: go_web_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@transaction-bank-postgres:5432/banking?sslmode=disable}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SERVER_PORT=${SERVER_PORT:-:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HMAC_SECRET=${HMAC_SECRET:-default-hmac-secret}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    depends_on:
      - transaction-bank-postgres