version: '3.8'

services:
  transaction-bank-postgres:
    image: postgres:17.1-bookworm
    container_name: transation-env-postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    restart: always

  app:
    build: .
    container_name: go_web_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_PORT=${SERVER_PORT}
    depends_on:
      - transaction-bank-postgres